<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for You</title>
    <style>
        :root {
            --bg-color: #fdf2f2;
            --env-color: #ffafcc;
            --env-dark: #fb6f92;
            --paper-color: #ffffff;
            --star-color: #ffc8dd;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Container for the whole thing */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .envelope-wrapper:hover {
            transform: translateY(-10px);
        }

        /* The Main Envelope Body */
        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--env-color);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* The Flap */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 20;
            border-top: 130px solid var(--env-dark);
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.4s 0.4s ease-in-out;
        }

        /* The Front Triangles */
        .envelope::after {
            content: "";
            position: absolute;
            z-index: 25;
            border-top: 100px solid transparent;
            border-left: 150px solid var(--env-color);
            border-right: 150px solid var(--env-color);
            border-bottom: 100px solid var(--env-color);
            bottom: 0;
            border-radius: 10px;
        }

        /* The Letter/Photos Inside */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 90%;
            background: var(--paper-color);
            border-radius: 5px;
            z-index: 5;
            transition: transform 0.5s ease-in-out;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        .letter img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 5px;
            transform: rotate(-5deg);
        }

        .letter img:last-child {
            transform: rotate(5deg);
        }

        /* Decoration in the letter */
        .deco {
            color: var(--env-dark);
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* Open State */
        .envelope-wrapper.open .envelope::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translate(-50%, -150px); /* Slide the photos out */
        }

        /* Floating Stars Background */
        .star {
            position: absolute;
            background: var(--star-color);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.5;
            animation: drift 10s linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="star" style="width: 15px; height: 15px; left: 10%;"></div>
    <div class="star" style="width: 20px; height: 20px; left: 80%; animation-delay: 2s;"></div>
    <div class="star" style="width: 10px; height: 10px; left: 40%; animation-delay: 5s;"></div>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="envelope"></div>
        <div class="letter">
            <div style="display: flex;">
                <img src="pic1.jpg" alt="Photo 1">
                <img src="pic2.jpg" alt="Photo 2">
            </div>
            <div class="deco">✿ <i>I love you</i> ✿</div>
            <p style="font-size: 0.8rem; margin: 0; color: #888;">(Tap to close)</p>
        </div>
    </div>

</body>
</html>
